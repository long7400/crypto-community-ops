<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">CommunityManager Telegram Flow</title>
  <desc id="desc">Flow diagram for Telegram onboarding and moderation in the communityManager agent.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669" />
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12" />
    </filter>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #0f172a; }
      .title { font-size: 28px; font-weight: 700; }
      .subtitle { font-size: 14px; fill: #475569; }
      .section-title { font-size: 18px; font-weight: 700; }
      .node-title { font-size: 15px; font-weight: 700; }
      .node-body { font-size: 12px; fill: #334155; }
      .legend-text { font-size: 12px; fill: #334155; }
      .label { font-size: 11px; font-weight: 700; fill: #1e293b; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="900" fill="#f8fafc" />
  <text x="60" y="54" class="title">CommunityManager Telegram Flow</text>
  <text x="60" y="82" class="subtitle">Focus: onboarding when a user joins a Telegram group, plus moderation timeout flow</text>

  <rect x="50" y="120" width="1100" height="400" rx="20" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)" />
  <text x="72" y="154" class="section-title">Onboarding Flow</text>

  <rect x="80" y="190" width="170" height="84" rx="16" fill="#e0f2fe" stroke="#0284c7" stroke-width="2" filter="url(#shadow)" />
  <text x="100" y="220" class="node-title">Telegram Plugin</text>
  <text x="100" y="242" class="node-body">Phat event</text>
  <text x="100" y="258" class="node-body">`TELEGRAM_ENTITY_JOINED`</text>

  <rect x="300" y="190" width="220" height="84" rx="16" fill="#dbeafe" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
  <text x="320" y="220" class="node-title">CommunityManagerService</text>
  <text x="320" y="242" class="node-body">`onTelegramUserJoined(params)`</text>
  <text x="320" y="258" class="node-body">diem vao flow greeting</text>

  <polygon points="620,190 760,190 820,232 760,274 620,274 560,232" fill="#ffedd5" stroke="#ea580c" stroke-width="2" filter="url(#shadow)" />
  <text x="665" y="227" class="node-title">Greet enabled?</text>
  <text x="640" y="247" class="node-body">doc `SHOULD_GREET_NEW_PERSONS`</text>

  <rect x="860" y="190" width="220" height="84" rx="16" fill="#dcfce7" stroke="#059669" stroke-width="2" filter="url(#shadow)" />
  <text x="880" y="220" class="node-title">Load settings</text>
  <text x="880" y="242" class="node-body">lay `GREETING_MESSAGE`</text>
  <text x="880" y="258" class="node-body">dung ten `newMember`</text>

  <rect x="860" y="320" width="220" height="92" rx="16" fill="#ede9fe" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)" />
  <text x="880" y="350" class="node-title">LLM Greeting</text>
  <text x="880" y="372" class="node-body">`getGreetingMessage(...)`</text>
  <text x="880" y="388" class="node-body">`runtime.useModel(...)`</text>

  <rect x="600" y="320" width="190" height="92" rx="16" fill="#fef3c7" stroke="#d97706" stroke-width="2" filter="url(#shadow)" />
  <text x="620" y="350" class="node-title">ctx.reply</text>
  <text x="620" y="372" class="node-body">gui welcome text</text>
  <text x="620" y="388" class="node-body">vao group Telegram</text>

  <rect x="350" y="320" width="180" height="92" rx="16" fill="#e2e8f0" stroke="#64748b" stroke-width="2" filter="url(#shadow)" />
  <text x="370" y="350" class="node-title">ensureRoomExists</text>
  <text x="370" y="372" class="node-body">map `ctx.chat.id`</text>
  <text x="370" y="388" class="node-body">thanh room runtime</text>

  <rect x="100" y="320" width="190" height="92" rx="16" fill="#f1f5f9" stroke="#475569" stroke-width="2" filter="url(#shadow)" />
  <text x="120" y="350" class="node-title">createMemory</text>
  <text x="120" y="372" class="node-body">luu `GREET_NEW_PERSON`</text>
  <text x="120" y="388" class="node-body">source = telegram</text>

  <rect x="600" y="448" width="190" height="52" rx="14" fill="#fee2e2" stroke="#dc2626" stroke-width="2" filter="url(#shadow)" />
  <text x="622" y="478" class="node-title">Neu tat greeting</text>
  <text x="622" y="494" class="node-body">return som</text>

  <path d="M250 232 L300 232" stroke="#2563eb" stroke-width="2.5" fill="none" marker-end="url(#arrow-blue)" />
  <rect x="260" y="212" width="34" height="18" rx="6" fill="#f8fafc" opacity="0.96" />
  <text x="267" y="225" class="label">event</text>

  <path d="M520 232 L560 232" stroke="#2563eb" stroke-width="2.5" fill="none" marker-end="url(#arrow-blue)" />
  <rect x="527" y="212" width="28" height="18" rx="6" fill="#f8fafc" opacity="0.96" />
  <text x="533" y="225" class="label">doc</text>

  <path d="M820 232 L860 232" stroke="#2563eb" stroke-width="2.5" fill="none" marker-end="url(#arrow-blue)" />
  <rect x="828" y="212" width="20" height="18" rx="6" fill="#f8fafc" opacity="0.96" />
  <text x="833" y="225" class="label">yes</text>

  <path d="M960 274 L960 320" stroke="#2563eb" stroke-width="2.5" fill="none" marker-end="url(#arrow-blue)" />
  <rect x="970" y="292" width="46" height="18" rx="6" fill="#f8fafc" opacity="0.96" />
  <text x="976" y="305" class="label">prompt</text>

  <path d="M860 366 L790 366" stroke="#2563eb" stroke-width="2.5" fill="none" marker-end="url(#arrow-blue)" />
  <rect x="804" y="346" width="42" height="18" rx="6" fill="#f8fafc" opacity="0.96" />
  <text x="810" y="359" class="label">text</text>

  <path d="M600 366 L530 366" stroke="#2563eb" stroke-width="2.5" fill="none" marker-end="url(#arrow-blue)" />
  <rect x="545" y="346" width="34" height="18" rx="6" fill="#f8fafc" opacity="0.96" />
  <text x="551" y="359" class="label">chat</text>

  <path d="M350 366 L290 366" stroke="#059669" stroke-width="2" stroke-dasharray="5 3" fill="none" marker-end="url(#arrow-green)" />
  <rect x="304" y="346" width="34" height="18" rx="6" fill="#f8fafc" opacity="0.96" />
  <text x="310" y="359" class="label">store</text>

  <path d="M690 274 L690 448" stroke="#ea580c" stroke-width="2" fill="none" marker-end="url(#arrow-orange)" />
  <rect x="700" y="352" width="26" height="18" rx="6" fill="#f8fafc" opacity="0.96" />
  <text x="706" y="365" class="label">no</text>

  <rect x="50" y="550" width="1100" height="250" rx="20" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)" />
  <text x="72" y="584" class="section-title">Moderation Flow</text>

  <rect x="90" y="630" width="180" height="86" rx="16" fill="#e0f2fe" stroke="#0284c7" stroke-width="2" filter="url(#shadow)" />
  <text x="110" y="660" class="node-title">Message in group</text>
  <text x="110" y="682" class="node-body">message source = telegram</text>
  <text x="110" y="698" class="node-body">group context</text>

  <rect x="330" y="630" width="220" height="86" rx="16" fill="#dbeafe" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
  <text x="350" y="660" class="node-title">TIMEOUT_USER action</text>
  <text x="350" y="682" class="node-body">validate + gather state</text>
  <text x="350" y="698" class="node-body">recent messages</text>

  <rect x="610" y="630" width="220" height="86" rx="16" fill="#ede9fe" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)" />
  <text x="630" y="660" class="node-title">LLM decision</text>
  <text x="630" y="682" class="node-body">chon `ENTITY_ID` + duration</text>
  <text x="630" y="698" class="node-body">JSON output</text>

  <rect x="890" y="630" width="210" height="86" rx="16" fill="#dcfce7" stroke="#059669" stroke-width="2" filter="url(#shadow)" />
  <text x="910" y="660" class="node-title">restrictChatMember</text>
  <text x="910" y="682" class="node-body">cam gui message/media</text>
  <text x="910" y="698" class="node-body">den `until_date`</text>

  <path d="M270 673 L330 673" stroke="#2563eb" stroke-width="2.5" fill="none" marker-end="url(#arrow-blue)" />
  <rect x="286" y="653" width="38" height="18" rx="6" fill="#f8fafc" opacity="0.96" />
  <text x="292" y="666" class="label">check</text>

  <path d="M550 673 L610 673" stroke="#2563eb" stroke-width="2.5" fill="none" marker-end="url(#arrow-blue)" />
  <rect x="566" y="653" width="42" height="18" rx="6" fill="#f8fafc" opacity="0.96" />
  <text x="572" y="666" class="label">judge</text>

  <path d="M830 673 L890 673" stroke="#2563eb" stroke-width="2.5" fill="none" marker-end="url(#arrow-blue)" />
  <rect x="846" y="653" width="36" height="18" rx="6" fill="#f8fafc" opacity="0.96" />
  <text x="852" y="666" class="label">apply</text>

  <path d="M995 716 C995 760 720 770 440 770 C280 770 190 760 190 720" stroke="#059669" stroke-width="2" stroke-dasharray="5 3" fill="none" marker-end="url(#arrow-green)" />
  <rect x="560" y="748" width="90" height="18" rx="6" fill="#f8fafc" opacity="0.96" />
  <text x="568" y="761" class="label">store moderation</text>

  <rect x="70" y="824" width="360" height="54" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
  <text x="92" y="846" class="legend-text">Legend</text>
  <path d="M150 842 L205 842" stroke="#2563eb" stroke-width="2.5" fill="none" marker-end="url(#arrow-blue)" />
  <text x="218" y="846" class="legend-text">Primary flow</text>
  <path d="M150 862 L205 862" stroke="#ea580c" stroke-width="2" fill="none" marker-end="url(#arrow-orange)" />
  <text x="218" y="866" class="legend-text">Decision / early return</text>
  <path d="M320 862 L375 862" stroke="#059669" stroke-width="2" stroke-dasharray="5 3" fill="none" marker-end="url(#arrow-green)" />
  <text x="388" y="866" class="legend-text">Memory write</text>

  <rect x="470" y="824" width="650" height="54" rx="14" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5" />
  <text x="492" y="846" class="legend-text">Files: `communityService.ts` handles Telegram join flow, `actions/timeout.ts` handles Telegram moderation</text>
  <text x="492" y="866" class="legend-text">Key settings: `SHOULD_GREET_NEW_PERSONS`, `GREETING_MESSAGE`</text>
</svg>
